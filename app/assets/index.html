<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tarot & Cocktails</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#08091a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#f0ede8;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
:root{--bg:#08091a;--gold:#c8a84a;--gold2:#fce890;--vbg:#1a1035;--vbg2:#2d1f5e;--vborder:#534AB7;--v2:#AFA9EC;--tbg:#085041;--tbg2:#0d6b4a;--tborder:#1D9E75;--t2:#9FE1CB;--text:#f0ede8;--text2:rgba(240,237,232,0.6);--up-bg:#E1F5EE;--up-fg:#085041;--rev-bg:#FBEAF0;--rev-fg:#72243E;--r:16px;--r2:30px;
--btn-a-bg:linear-gradient(135deg,var(--vbg2),var(--vbg));--btn-a-sh:0 0 0 1px rgba(200,168,74,.55),0 0 18px rgba(127,119,221,.4),0 3px 10px rgba(0,0,0,.6);
--btn-n-bg:linear-gradient(135deg,var(--tbg2),var(--tbg));--btn-n-sh:0 0 0 1px rgba(93,202,165,.55),0 0 18px rgba(29,158,117,.35),0 3px 10px rgba(0,0,0,.6)}
.app{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.ph{display:none;flex-direction:column;align-items:center;gap:.9rem;padding:1.5rem 1rem;min-height:100vh;justify-content:center}
.ph.on{display:flex}

@keyframes si{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.85}}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes df{0%{opacity:0;transform:translateY(0)}30%{opacity:1}100%{opacity:0;transform:translateY(16px)}}
@keyframes flashBurst{0%{opacity:0}15%{opacity:.85}40%{opacity:.3}100%{opacity:0}}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.08);opacity:1}}

/* Splash */
.spl{display:flex;flex-direction:column;align-items:center;gap:.9rem;animation:si .8s ease-out}
.spl-t{color:var(--gold);font-size:17px;font-weight:500;letter-spacing:4px;text-align:center}
.spl-s{color:rgba(200,168,74,.45);font-size:11px;letter-spacing:2px;text-align:center}
.spl-tap{color:rgba(200,168,74,.4);font-size:11px;letter-spacing:2px;cursor:pointer;animation:blink 2s 1s infinite}

/* Mode */
.mtog{display:flex;width:100%;border:0.5px solid rgba(255,255,255,.1);border-radius:var(--r2);overflow:hidden}
.mbtn{flex:1;padding:11px 0;font-size:13px;font-weight:500;border:none;background:transparent;cursor:pointer;color:var(--text2);border-radius:var(--r2);transition:all .2s}
.mbtn.va{background:var(--vbg);color:var(--v2)}.mbtn.na{background:var(--tbg);color:var(--t2)}
.mdesc{font-size:12px;color:var(--text2);text-align:center;line-height:1.6}
.sbtn{width:100%;padding:13px;border-radius:var(--r2);border:none;font-size:14px;font-weight:600;cursor:pointer;color:#fff;letter-spacing:.3px;transition:all .2s}
.sbtn.v{background:var(--btn-a-bg);box-shadow:var(--btn-a-sh)}.sbtn.t{background:var(--btn-n-bg);box-shadow:var(--btn-n-sh)}

/* Gallery */
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;padding:0 4px}
.gal-card{background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s}
.gal-card:hover{background:rgba(255,255,255,.08);border-color:rgba(200,168,74,.4)}
.gal-sym{font-size:28px;line-height:1.2}
.gal-nm{font-size:11px;color:#fce890;margin-top:4px;font-weight:500}
.gal-en{font-size:8px;color:rgba(200,168,74,.5);letter-spacing:.5px}
.gal-detail{width:100%;display:flex;flex-direction:column;gap:10px;animation:fu .3s ease-out}
.gal-back{font-size:12px;color:rgba(200,168,74,.6);cursor:pointer;display:flex;align-items:center;gap:4px}
.gal-back:hover{color:var(--gold)}
.gal-pair{background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:6px}
.gal-pair-title{font-size:10px;letter-spacing:1px;color:rgba(200,168,74,.6);text-transform:uppercase}
.gal-pair-name{font-size:16px;font-weight:500;color:var(--text)}
.gal-pair-note{font-size:12px;color:var(--text2)}
.gal-pair-story{font-size:12px;color:var(--text2);line-height:1.7;font-style:italic}
.gal-tab{display:flex;gap:6px;width:100%}
.gal-tab-btn{flex:1;padding:8px;border-radius:20px;border:0.5px solid rgba(255,255,255,.12);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s}
.gal-tab-btn.on{background:var(--vbg);color:var(--v2);border-color:var(--vborder)}
.gal-tab-btn.on-na{background:var(--tbg);color:var(--t2);border-color:var(--tborder)}
.menu-btn{width:100%;padding:11px;border-radius:var(--r2);border:0.5px solid rgba(200,168,74,.3);background:transparent;font-size:13px;cursor:pointer;color:var(--gold);display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;letter-spacing:.5px}
.menu-btn:hover{background:rgba(200,168,74,.08)}


.hist-item{width:100%;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);border-radius:12px;padding:11px;margin-top:7px;cursor:pointer;transition:background .15s}
.hist-item:hover{background:rgba(255,255,255,.08)}
.favbtn{width:100%;padding:11px;border-radius:var(--r2);border:0.5px solid rgba(200,168,74,.3);background:transparent;font-size:13px;cursor:pointer;color:var(--gold);text-align:center;transition:all .15s;letter-spacing:.5px}
.favbtn:hover{background:rgba(200,168,74,.08)}
/* Dots */
.dots{display:flex;gap:6px}.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .2s}
.dot.av{background:var(--vborder)}.dot.dv{background:var(--v2)}.dot.at{background:var(--tborder)}.dot.dt{background:var(--t2)}

/* Mood */
.mqt{font-size:15px;font-weight:500;text-align:center;line-height:1.5}
.mqt small{display:block;font-size:12px;color:var(--text2);font-weight:400;margin-top:3px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.opt{padding:13px 10px;border-radius:var(--r);border:0.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);cursor:pointer;text-align:center;transition:all .15s}
.opt:hover{background:rgba(255,255,255,.08)}
.opt.sv{background:var(--vbg);border-color:var(--vborder);color:var(--v2)}.opt.st{background:var(--tbg);border-color:var(--tborder);color:var(--t2)}
.opt i{font-size:20px;display:block;margin-bottom:5px;font-style:normal}.opt b{font-size:13px;display:block;font-weight:500}
.opt small{font-size:11px;color:var(--text2)}.opt.sv small{color:#7F77DD}.opt.st small{color:#5DCAA5}
.nxt{width:100%;padding:13px;border-radius:var(--r2);border:none;font-size:14px;font-weight:600;color:#fff;cursor:pointer;opacity:.35;pointer-events:none;transition:all .2s;letter-spacing:.3px}
.nxt.rdy{opacity:1;pointer-events:all}
.nxt.v{background:var(--btn-a-bg);box-shadow:var(--btn-a-sh)}.nxt.t{background:var(--btn-n-bg);box-shadow:var(--btn-n-sh)}

/* Card */
.card-wrap{position:relative;width:180px;height:270px;display:flex;align-items:center;justify-content:center}
.card-scene{perspective:900px;width:160px;height:250px;cursor:pointer;position:relative;z-index:2}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,0,.2,1)}
.card-scene.fp .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;overflow:hidden}
.cbk{display:flex;align-items:center;justify-content:center;border:2px solid}.cbk.v{background:#0d0820;border-color:var(--vborder)}.cbk.t{background:#04342C;border-color:var(--tborder)}
.cbi{width:130px;height:210px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:38px;color:rgba(200,168,74,.5)}.cbi.v{border:1px solid #3C3489}.cbi.t{border:1px solid #085041}
.cfr{transform:rotateY(180deg);position:relative}
.cfr svg{width:100%;height:100%;border-radius:14px}
.pos-badge{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;padding:3px 14px;border-radius:20px;font-weight:600;letter-spacing:1px;z-index:3;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.pos-badge.up{background:rgba(225,245,238,0.92);color:#085041}
.pos-badge.rev{background:rgba(251,234,240,0.92);color:#72243E}
.tph{font-size:12px;color:var(--text2);text-align:center;animation:blink 2s infinite}
.gr{position:absolute;inset:-20px;border-radius:50%;pointer-events:none;opacity:0;transition:opacity .4s}.gr.on{opacity:1}
.gri{width:100%;height:100%;border-radius:50%;animation:ringPulse 1.8s ease-in-out infinite}
.fl{position:absolute;inset:-30px;border-radius:20px;pointer-events:none;opacity:0;z-index:10}.fl.burst{animation:flashBurst .7s ease-out forwards}
.ptcl{position:absolute;inset:-40px;pointer-events:none;overflow:visible;z-index:5}
.kw{opacity:0;transform:translateY(8px);transition:all .5s;font-size:13px;color:var(--gold);letter-spacing:2px;text-align:center;font-style:italic;min-height:20px}.kw.on{opacity:1;transform:translateY(0)}
.dbn{padding:12px 32px;border-radius:var(--r2);border:none;font-size:14px;font-weight:600;cursor:pointer;color:#fff;letter-spacing:.3px;opacity:0;pointer-events:none;transform:translateY(10px);transition:all .5s .3s ease}
.dbn.show{opacity:1;pointer-events:all;transform:translateY(0)}
.dbn.v{background:var(--btn-a-bg);box-shadow:var(--btn-a-sh)}.dbn.t{background:var(--btn-n-bg);box-shadow:var(--btn-n-sh)}

/* Shake */
.ski-pill{border-radius:10px;padding:7px 16px;font-size:12px;display:flex;align-items:center;gap:6px}
.ski-pill.v{background:var(--vbg);color:var(--v2)}.ski-pill.t{background:var(--tbg);color:var(--t2)}



.shkw{display:flex;flex-direction:column;align-items:center}
.drps{display:flex;gap:5px;margin-top:-6px}.drp{width:7px;height:7px;border-radius:50%;animation:df .55s infinite;opacity:0}
.sl{font-size:12px;color:var(--text2);margin-top:7px;text-align:center}

/* Result */
.rw{width:100%;display:flex;flex-direction:column;gap:10px;animation:fu .5s ease-out}
.rbadge{font-size:11px;padding:3px 12px;border-radius:20px;font-weight:500;align-self:center}
.rbadge.v{background:#EEEDFE;color:#534AB7}.rbadge.t{background:#E1F5EE;color:#085041}
.rpair{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;padding:5px 14px;border-radius:20px;align-self:center}
.rpair.v{background:#EEEDFE;color:#534AB7}.rpair.t{background:#E1F5EE;color:#085041}
.rhero{background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.ricon{font-size:42px;line-height:1}.rname{font-size:20px;font-weight:500}
.rorient{font-size:11px;padding:3px 11px;border-radius:20px;font-weight:500}
.ppu{background:var(--up-bg);color:var(--up-fg)}.ppr{background:var(--rev-bg);color:var(--rev-fg)}
.rstory{font-size:13px;color:var(--text2);line-height:1.75}
.rherb{font-size:12px;padding:4px 14px;border-radius:20px;background:rgba(93,202,165,.15);color:var(--t2);align-self:center}
.rdiff{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);flex-wrap:wrap;justify-content:center}
.abv{font-size:11px;padding:2px 10px;border-radius:20px;background:rgba(200,168,74,.15);color:var(--gold);font-weight:500}
.d1{color:#1D9E75}.d2{color:#BA7517}
.rrec{background:rgba(255,255,255,.04);border-radius:var(--r);padding:13px;cursor:pointer;border:0.5px solid rgba(255,255,255,.08)}
.rrect{font-size:11px;letter-spacing:1px;color:var(--text2);text-transform:uppercase;display:flex;justify-content:space-between}
.rrows{margin-top:9px;display:none}.rrows.open{display:block}
.rrow{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:0.5px solid rgba(255,255,255,.07)}
.rrow:last-child{border-bottom:none}.rrow span{color:var(--text2)}
.mpb{width:100%;padding:11px;border-radius:var(--r2);border:0.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);font-size:13px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s}
.mpb:hover{background:rgba(255,255,255,.1)}
.ragn{width:100%;padding:12px;border-radius:var(--r2);border:none;font-size:13px;font-weight:600;cursor:pointer;color:#fff;letter-spacing:.3px;transition:all .2s}
.ragn.v{background:var(--btn-a-bg);box-shadow:var(--btn-a-sh)}.ragn.t{background:var(--btn-n-bg);box-shadow:var(--btn-n-sh)}
.lbl{font-size:10px;letter-spacing:2px;color:rgba(200,168,74,.5);text-transform:uppercase}
</style>
</head>

let mode='a',mqs=0,ans=[],card=null,up=true,flipped=false,animId=null,t=0,lbTimer=null;
setTimeout(()=>show('p-mode'),2500);

function show(id){document.querySelectorAll('.ph').forEach(p=>p.classList.remove('on'));document.getElementById(id).classList.add('on');}
function setMode(m){mode=m;document.getElementById('mb-a').className='mbtn'+(m==='a'?' va':'');document.getElementById('mb-n').className='mbtn'+(m==='n'?' na':'');document.getElementById('mdesc').textContent=m==='a'?'カードの世界観に合わせた、ストーリーのあるカクテルを一杯。':'アルコールなしでも、タロットの物語を体験できるモクテルを。';const sb=document.getElementById('stbtn');sb.className='sbtn '+(m==='a'?'v':'t');sb.textContent=m==='a'?'今夜の一杯を探す →':'今夜のモクテルを探す →';}
function goMood(){mqs=0;ans=[];renderQ();show('p-mood');}
function renderQ(){const q=QS[mqs];document.getElementById('mqt').innerHTML=q.q+'<small>直感で選んでください</small>';document.getElementById('mqo').innerHTML=q.opts.map((o,i)=>`<div class="opt" id="o${i}" onclick="pick(${i})"><i>${o.i}</i><b>${o.l}</b><small>${o.s}</small></div>`).join('');['dt0','dt1','dt2'].forEach((id,i)=>{document.getElementById(id).className='dot'+(i<mqs?' '+(mode==='a'?'dv':'dt'):i===mqs?' '+(mode==='a'?'av':'at'):'');});const nb=document.getElementById('nxtb');nb.className='nxt '+(mode==='a'?'v':'t');nb.classList.remove('rdy');nb.textContent=mqs<2?'次へ':'カードを引きに行く →';}
function pick(i){ans[mqs]=i;document.querySelectorAll('.opt').forEach((o,j)=>o.className='opt'+(j===i?' '+(mode==='a'?'sv':'st'):''));document.getElementById('nxtb').classList.add('rdy');}
function nextQ(){if(ans[mqs]===undefined)return;if(mqs<2){mqs++;renderQ();}else{startDraw();}}
function startDraw(){const key=ans.join('');const pool=POOLS[key]||POOLS['010'];const idx=pool[Math.floor(Math.random()*pool.length)];card=C.find(c=>c.n===idx)||C[0];up=Math.random()>0.42;flipped=false;document.getElementById('cfr').innerHTML=
  (CARD_IMG[card.n] ?
    '<img src="'+CARD_IMG[card.n]+'" style="width:100%;height:100%;object-fit:contain;border-radius:14px;'+(up?'':'transform:rotate(180deg)')+'" />'
  :
    (CARD_SVG[card.n]||'')+'<div class="pos-badge '+(up?'up':'rev')+'">'+(up?'正位置':'逆位置')+'</div>'
  );document.getElementById('cbk').className='card-face cbk '+(mode==='a'?'v':'t');document.getElementById('cbi').className='cbi '+(mode==='a'?'v':'t');document.getElementById('csc').classList.remove('fp');document.getElementById('tph').style.display='block';document.getElementById('kwb').classList.remove('on');document.getElementById('kwb').textContent='';document.getElementById('gr').classList.remove('on');document.getElementById('ptcl').innerHTML='';const db=document.getElementById('dbn');db.className='dbn '+(mode==='a'?'v':'t');db.textContent=mode==='a'?'🍸 調合する':'🌿 調合する';show('p-draw');}
function flipCard(){if(flipped)return;flipped=true;document.getElementById('csc').classList.add('fp');document.getElementById('tph').style.display='none';setTimeout(()=>{triggerFlash();spawnParticles();startGlow();},380);setTimeout(()=>{const kw=document.getElementById('kwb');kw.textContent='— '+card.k+' —';kw.classList.add('on');},600);setTimeout(()=>{document.getElementById('dbn').classList.add('show');},900);}
function triggerFlash(){const f=document.getElementById('fl');f.style.background='radial-gradient(circle,rgba(200,168,74,0.65) 0%,transparent 70%)';f.classList.remove('burst');void f.offsetWidth;f.classList.add('burst');}
function startGlow(){document.getElementById('gr').classList.add('on');const i=document.getElementById('gri');i.style.background='radial-gradient(circle,transparent 55%,rgba(200,168,74,0.38) 70%,transparent 80%)';i.style.boxShadow='0 0 50px rgba(200,168,74,0.38),0 0 100px rgba(200,168,74,0.15)';}
function spawnParticles(){const svg=document.getElementById('ptcl');svg.innerHTML='';const cols=['#c8a84a','#fce890','#AFA9EC','#9FE1CB','#ED93B1','#ffffff'];for(let i=0;i<28;i++){const a=(i/28)*Math.PI*2,sp=65+Math.random()*90;const cx=80,cy=125,ex=cx+Math.cos(a)*sp,ey=cy+Math.sin(a)*sp;const col=cols[Math.floor(Math.random()*cols.length)];const r=2+Math.random()*3,dl=Math.random()*0.12,du=0.65+Math.random()*0.45;const el=document.createElementNS('http://www.w3.org/2000/svg','circle');el.setAttribute('cx',cx);el.setAttribute('cy',cy);el.setAttribute('r',r);el.setAttribute('fill',col);el.setAttribute('opacity','0');const am=document.createElementNS('http://www.w3.org/2000/svg','animateMotion');am.setAttribute('dur',du+'s');am.setAttribute('begin',dl+'s');am.setAttribute('fill','freeze');am.setAttribute('path','M0,0 L'+(ex-cx)+','+(ey-cy));el.appendChild(am);const ao=document.createElementNS('http://www.w3.org/2000/svg','animate');ao.setAttribute('attributeName','opacity');ao.setAttribute('values','0;1;0');ao.setAttribute('dur',du+'s');ao.setAttribute('begin',dl+'s');ao.setAttribute('fill','freeze');el.appendChild(ao);svg.appendChild(el);}setTimeout(()=>{svg.innerHTML='';},1800);}

function goShake(){const sk=document.getElementById('ski');sk.textContent='🃏 '+card.nm+' — '+(up?'正位置':'逆位置');sk.className='ski-pill '+(mode==='a'?'v':'t');show('p-shake');t=0;if(animId)cancelAnimationFrame(animId);animShake();const lbls=mode==='a'?["調合中...","カードと対話中...","魂を注入中...","氷が踊っています..."]:["ハーブを選んでいます...","カードと対話中...","エッセンスを注入中...","炭酸を注いでいます..."];let li=0;document.getElementById('sl').textContent=lbls[0];lbTimer=setInterval(()=>{li=(li+1)%lbls.length;document.getElementById('sl').textContent=lbls[li];},750);setTimeout(()=>{clearInterval(lbTimer);if(animId){cancelAnimationFrame(animId);animId=null;}const g=document.getElementById('shkg');let f=0;const sr=parseFloat((g.style.transform.match(/rotate\(([^d]+)deg/)||['','0'])[1]);(function settle(){f++;const e=1-f/20;g.style.transform='rotate('+sr*e+'deg)';if(f<20)requestAnimationFrame(settle);else{g.style.transform='';document.querySelectorAll('#iceg rect').forEach(r=>r.removeAttribute('transform'));}})();showResult();},2800);}

function animShake(){t+=0.052;const rot=Math.sin(t*2.1)*16+Math.sin(t*3.3)*5,tx=Math.sin(t*2.0+.5)*10,ty=-Math.abs(Math.sin(t*2.1))*14;document.getElementById('shkg').style.transform='translateX('+tx+'px) translateY('+ty+'px) rotate('+rot+'deg)';document.querySelectorAll('#iceg rect').forEach((r,i)=>{const bx=parseFloat(r.getAttribute('x')),by=parseFloat(r.getAttribute('y'));const bw=parseFloat(r.getAttribute('width')),bh=parseFloat(r.getAttribute('height'));const ang=Math.sin(t*2.4+i*1.4)*20,dx=Math.sin(t*2.8+i*1.1)*5,dy=Math.sin(t*3.1+i*0.9)*4;r.setAttribute('transform','rotate('+ang+','+(bx+bw/2)+','+(by+bh/2)+') translate('+dx+','+dy+')');});if(Math.random()<0.05)spawnDrop();animId=requestAnimationFrame(animShake);}
function spawnDrop(){const d=document.createElementNS('http://www.w3.org/2000/svg','circle');const cols=['#85B7EB','#AFA9EC','#9FE1CB','#F4C0D1'];d.setAttribute('cx',55+Math.random()*50);d.setAttribute('cy',92);d.setAttribute('r',1.8+Math.random()*2.2);d.setAttribute('fill',cols[Math.floor(Math.random()*cols.length)]);d.setAttribute('opacity','0.9');document.getElementById('drpsg').appendChild(d);let op=0.9,vy=0;(function fall(){vy+=0.4;const cy=parseFloat(d.getAttribute('cy'));op-=0.025;d.setAttribute('cy',cy+vy*0.22+1.5);d.setAttribute('opacity',Math.max(0,op));if(op>0)requestAnimationFrame(fall);else d.remove();})();}

function showResult(){addToHistory();checkFavStatus();const d=(mode==='a'?card.a:card.na)[up?'u':'v'];const isA=mode==='a';const stars=['','★','★★'];const shareText='今夜、'+card.nm+'に選ばれた。\n一杯は '+d.c+'。\n\n#TarotAndCocktails #今夜の一杯 #タロット占い';document.getElementById('rw').innerHTML='<div class="rbadge '+(isA?'v':'t')+'">'+(isA?'🍸 カクテル':'🌿 モクテル')+'</div><div class="rpair '+(isA?'v':'t')+'">'+card.s+' '+card.nm+' × '+d.c+'</div><div class="rhero"><div class="ricon">'+d.i+'</div><div class="rname">'+d.c+'</div><div class="rorient '+(up?'ppu':'ppr')+'">'+d.o+' — '+(d.nt||'')+'</div><div class="rstory">'+d.st+'</div>'+(!isA&&d.h?'<div class="rherb">🌿 '+d.h+'</div>':'')+(isA&&d.d?'<div class="rdiff"><span class="'+(d.d===1?'d1':'d2')+'">'+stars[d.d]+'</span><span>'+d.dl+'</span>'+(ABV[d.c]?'<span class="abv">'+ABV[d.c]+'</span>':'')+'</div>':'')+'</div><div class="rrec" onclick="toggleRec(this)"><div class="rrect">レシピを見る<span>▾</span></div><div class="rrows">'+d.r.map(x=>'<div class="rrow">'+x[0]+'<span>'+x[1]+'</span></div>').join('')+'</div></div><button class="mpb" id="favbtn" onclick="toggleFavorite()" class="favbtn">🤍 お気に入りに追加</button><button class="mpb" onclick="openMap()">📍 近くのバーを探す →</button><button class="mpb" onclick="doShare(\''+card.nm+'\',\''+d.c.replace(/'/g,"\\'")+'\',\''+d.o+'\')">📤 シェアする</button><button class="ragn '+(isA?'v':'t')+'" onclick="reset()">最初からやり直す</button>';show('p-res');}

function toggleRec(el){const r=el.querySelector('.rrows');const t=el.querySelector('span:last-child');r.classList.toggle('open');t.textContent=r.classList.contains('open')?'▴':'▾';}
function openMap(){window.open('https://maps.apple.com/?q='+encodeURIComponent('バー'),'_blank');}
function doShare(cardName,cocktailName,orient){const text='今夜、'+cardName+'（'+orient+'）に選ばれた。\n一杯は '+cocktailName+'。\n\n#TarotAndCocktails #今夜の一杯 #タロット占い';if(window.ReactNativeWebView){window.ReactNativeWebView.postMessage(JSON.stringify({type:'share',text:text}));}else if(navigator.share){navigator.share({title:'Tarot & Cocktails',text:text}).catch(()=>{});}else if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>alert('テキストをコピーしました！SNSに貼り付けてシェアしてね'));}}


// === GALLERY ===
function showGallery(){
  const cont=document.getElementById('gal-content');
  let html='<div class="gal-grid">';
  C.forEach(c=>{
    html+=`<div class="gal-card" onclick="showGalDetail(${c.n})">
      ${CARD_IMG[c.n] ? '<img src="'+CARD_IMG[c.n]+'" style="width:60px;height:100px;object-fit:cover;border-radius:4px" />' : '<div class="gal-sym">'+c.s+'</div>'}
      <div class="gal-nm">${c.nm}</div>
      <div class="gal-en">${c.en}</div>
    </div>`;
  });
  html+='</div>';
  cont.innerHTML=html;
  show('p-gal');
}

function showGalDetail(num){
  const c=C.find(x=>x.n===num);
  if(!c)return;
  const cont=document.getElementById('gal-content');
  const au=c.a.u, av=c.a.v, nu=c.na.u, nv=c.na.v;
  const stars=['','★','★★'];

  let html=`<div class="gal-detail">
    <div class="gal-back" onclick="showGallery()">← 図鑑に戻る</div>
    <div style="text-align:center">
      ${CARD_IMG[c.n] ? '<img src="'+CARD_IMG[c.n]+'" style="width:120px;height:200px;object-fit:cover;border-radius:8px;margin:8px 0" />' : '<div style="font-size:48px;margin:8px 0">'+c.s+'</div>'}
      <div style="font-size:22px;font-weight:500;color:#fce890">${c.nm}</div>
      <div style="font-size:12px;color:rgba(200,168,74,.6);letter-spacing:2px;margin-top:4px">${c.en}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:6px;font-style:italic">${c.k}</div>
    </div>
    <div class="gal-tab">
      <button class="gal-tab-btn on" id="gt-alc" onclick="switchGalTab('alc',${num})">🍸 アルコール</button>
      <button class="gal-tab-btn" id="gt-na" onclick="switchGalTab('na',${num})">🌿 ノンアル</button>
    </div>
    <div id="gal-pairs">`;

  html+=renderGalPairs(au, av, 'alc');
  html+=`</div></div>`;
  cont.innerHTML=html;
}

function switchGalTab(tab, num){
  const c=C.find(x=>x.n===num);
  document.getElementById('gt-alc').className='gal-tab-btn'+(tab==='alc'?' on':'');
  document.getElementById('gt-na').className='gal-tab-btn'+(tab==='na'?' on-na':'');
  const pairs=document.getElementById('gal-pairs');
  if(tab==='alc') pairs.innerHTML=renderGalPairs(c.a.u, c.a.v, 'alc');
  else pairs.innerHTML=renderGalPairs(c.na.u, c.na.v, 'na');
}

function renderGalPairs(up, rev, mode){
  const stars=['','★','★★'];
  const isA=mode==='alc';
  let html='';

  // Upright
  html+=`<div class="gal-pair">
    <div class="gal-pair-title">▲ 正位置</div>
    <div class="gal-pair-name">${up.i} ${up.c}</div>
    <div class="gal-pair-note">${isA?(up.nt+' · '+stars[up.d]+' '+up.dl):up.h}</div>
    <div class="gal-pair-story">${up.st}</div>
  </div>`;

  // Reversed
  html+=`<div class="gal-pair">
    <div class="gal-pair-title">▼ 逆位置</div>
    <div class="gal-pair-name">${rev.i} ${rev.c}</div>
    <div class="gal-pair-note">${isA?(rev.nt+' · '+stars[rev.d]+' '+rev.dl):rev.h}</div>
    <div class="gal-pair-story">${rev.st}</div>
  </div>`;

  return html;
}

function reset(){if(animId){cancelAnimationFrame(animId);animId=null;}mqs=0;ans=[];card=null;show('p-mode');}


// === NATIVE BRIDGE ===
// React Native からのメッセージ受信
window.addEventListener('message', function(e) {
  try {
    const msg = JSON.parse(e.data);
    if (msg.type === 'shake' && document.getElementById('p-draw').classList.contains('on') && !flipped) {
      flipCard();
    }
    if (msg.type === 'favoritesData') { _favs = msg.data; renderFavScreen(); }
    if (msg.type === 'historyData') { _hist = msg.data; renderHistScreen(); }
    if (msg.type === 'favStatus') { _isFav = msg.data; updateFavBtn(); }
  } catch(ex) {}
});

// RN にメッセージ送信
function sendToRN(msg) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify(msg));
  }
}

// === お気に入り & 履歴（ローカル版 — RNがなくても動作） ===
var _favs = JSON.parse(localStorage.getItem('tc_favs') || '[]');
var _hist = JSON.parse(localStorage.getItem('tc_hist') || '[]');
var _isFav = false;

function saveFavs() { try { localStorage.setItem('tc_favs', JSON.stringify(_favs)); } catch(e){} }
function saveHist() { try { localStorage.setItem('tc_hist', JSON.stringify(_hist)); } catch(e){} }

function addToFavorites() {
  if (!card) return;
  const d = (mode==='a'?card.a:card.na)[up?'u':'v'];
  const orient = up ? '正位置' : '逆位置';
  const exists = _favs.find(f => f.cn === card.n && f.m === mode && f.o === orient);
  if (exists) return;
  _favs.unshift({ cn: card.n, nm: card.nm, cc: d.c, i: d.i, m: mode, o: orient, t: Date.now() });
  saveFavs();
  _isFav = true;
  updateFavBtn();
  sendToRN({ type: 'saveFav', data: _favs });
}

function removeFromFavorites() {
  if (!card) return;
  const orient = up ? '正位置' : '逆位置';
  _favs = _favs.filter(f => !(f.cn === card.n && f.m === mode && f.o === orient));
  saveFavs();
  _isFav = false;
  updateFavBtn();
  sendToRN({ type: 'saveFav', data: _favs });
}

function toggleFavorite() {
  if (_isFav) removeFromFavorites();
  else addToFavorites();
}

function checkFavStatus() {
  if (!card) return;
  const orient = up ? '正位置' : '逆位置';
  _isFav = _favs.some(f => f.cn === card.n && f.m === mode && f.o === orient);
  updateFavBtn();
}

function updateFavBtn() {
  const btn = document.getElementById('favbtn');
  if (btn) btn.textContent = _isFav ? '❤ お気に入りから削除' : '🤍 お気に入りに追加';
}

function addToHistory() {
  if (!card) return;
  const d = (mode==='a'?card.a:card.na)[up?'u':'v'];
  const orient = up ? '正位置' : '逆位置';
  _hist.unshift({ cn: card.n, nm: card.nm, cc: d.c, i: d.i, m: mode, o: orient, t: Date.now() });
  if (_hist.length > 100) _hist = _hist.slice(0, 100);
  saveHist();
  sendToRN({ type: 'saveHist', data: _hist });
}

// === お気に入り画面 ===
function showFavorites() {
  renderFavScreen();
  show('p-fav');
}

function renderFavScreen() {
  const el = document.getElementById('fav-list');
  if (!el) return;
  if (_favs.length === 0) {
    el.innerHTML = '<div style="color:rgba(240,237,232,0.4);text-align:center;padding:20px">まだお気に入りがありません</div>';
    return;
  }
  el.innerHTML = _favs.map((f, i) =>
    '<div class="hist-item" onclick="openFavDetail(' + i + ')">' +
    '<span style="font-size:20px">' + f.i + '</span>' +
    '<div style="flex:1"><div style="color:#f0ede8;font-size:13px;font-weight:500">' + f.nm + '（' + f.o + '）</div>' +
    '<div style="color:rgba(240,237,232,0.5);font-size:11px">' + f.cc + '</div></div>' +
    '<span style="font-size:10px;color:rgba(240,237,232,0.4)">' + (f.m==='a'?'🍸':'🌿') + '</span></div>'
  ).join('');
}

function openFavDetail(i) {
  const f = _favs[i];
  if (!f) return;
  card = C.find(c => c.n === f.cn);
  if (!card) return;
  mode = f.m;
  up = f.o === '正位置';
  _isFav = true;
  showResult();
}

// === 履歴画面 ===
function showHistory() {
  renderHistScreen();
  show('p-hist');
}

function renderHistScreen() {
  const el = document.getElementById('hist-list');
  if (!el) return;
  if (_hist.length === 0) {
    el.innerHTML = '<div style="color:rgba(240,237,232,0.4);text-align:center;padding:20px">まだ履歴がありません</div>';
    return;
  }
  el.innerHTML = _hist.map((h, i) =>
    '<div class="hist-item" onclick="openHistDetail(' + i + ')">' +
    '<span style="font-size:20px">' + h.i + '</span>' +
    '<div style="flex:1"><div style="color:#f0ede8;font-size:13px;font-weight:500">' + h.nm + '（' + h.o + '）</div>' +
    '<div style="color:rgba(240,237,232,0.5);font-size:11px">' + h.cc + '</div></div>' +
    '<span style="font-size:10px;color:rgba(240,237,232,0.4)">' + new Date(h.t).toLocaleDateString('ja-JP') + '</span></div>'
  ).join('');
}

function openHistDetail(i) {
  const h = _hist[i];
  if (!h) return;
  card = C.find(c => c.n === h.cn);
  if (!card) return;
  mode = h.m;
  up = h.o === '正位置';
  checkFavStatus();
  showResult();
}

function clearAllHistory() {
  if (confirm('全ての履歴を削除しますか？')) {
    _hist = [];
    saveHist();
    renderHistScreen();
    sendToRN({ type: 'saveHist', data: _hist });
  }
}
